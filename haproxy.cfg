##############################################
# HAProxy Configuration
# Project: Traffic Distribution with Web Application
# Author:  Rushikesh Chandanwar (Infrastructure Role)
# Year:    2025
##############################################

global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2000
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

#--------------------------------------------
# Frontend: accepts all incoming HTTP traffic
#--------------------------------------------
frontend http_front
    bind *:80
    default_backend app_servers

#--------------------------------------------
# Backend: distributes traffic to Node.js app servers
# Algorithm: roundrobin (alternates requests between servers)
#--------------------------------------------
backend app_servers
    balance roundrobin
    option httpchk GET /
    server app1 192.168.1.101:3001 check
    server app2 192.168.1.102:3001 check

#--------------------------------------------
# Stats page (optional monitoring dashboard)
#--------------------------------------------
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
