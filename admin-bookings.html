<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">RideNest</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="booking-db.html">DB Booking</a>
        <a class="active" href="admin-bookings.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="panel reveal">
      <h2>All Customer Bookings</h2>
      <p id="status" class="status">Loading bookings...</p>

      <div class="table-wrap">
        <table id="bookingsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>Email</th>
              <th>Passengers</th>
              <th>From</th>
              <th>Destination</th>
              <th>Travel Date</th>
              <th>Booked At</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    async function loadBookings() {
      const statusEl = document.getElementById("status");
      const apiBase = window.location.protocol === "file:" ? "http://localhost:3001" : window.location.origin;
      const tbody = document.querySelector("#bookingsTable tbody");

      try {
        const response = await fetch(`${apiBase}/api/bookings`);
        const rows = await response.json();

        if (!response.ok) {
          statusEl.textContent = rows.error || "Failed to load bookings.";
          return;
        }

        if (!rows.length) {
          statusEl.textContent = "No bookings found.";
          return;
        }

        tbody.innerHTML = rows
          .map((row) => {
            const bookedAt = new Date(row.booked_at).toLocaleString();
            return `
              <tr>
                <td>${row.id}</td>
                <td>${row.name}</td>
                <td>${row.mobile}</td>
                <td>${row.email}</td>
                <td>${row.passengers}</td>
                <td>${row.source}</td>
                <td>${row.destination}</td>
                <td>${row.travel_date}</td>
                <td>${bookedAt}</td>
              </tr>
            `;
          })
          .join("");

        statusEl.textContent = `Total bookings: ${rows.length}`;
      } catch (error) {
        statusEl.textContent = "Server error. Please try again.";
      }
    }

    loadBookings();
  </script>
</body>
</html>
